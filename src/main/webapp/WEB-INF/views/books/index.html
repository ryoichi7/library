<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org/">
<head>
    <meta charset="UTF-8">
    <title>Books</title>
</head>
<body>

<h1>Books list</h1>
<div th:each="book : ${books}">
    <a th:href="@{/books/{id}(id=${book.getId()})}" th:text="${book.getName()  + ', ' + book.getAuthor()}">Book</a>
</div>

<br/>
<hr/>

<a href="/books/new">Create new book</a>

</body>
</html>
